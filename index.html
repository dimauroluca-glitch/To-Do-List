<!DOCTYPE html>
<html lang="it">
<head>
    <title>To-Do List</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "3ce393c8-7d93-4c37-a87f-a268b6343602",
          allowLocalhostAsSecureOrigin: true
        });
        const userId = localStorage.getItem('todo_user_id');
        if (userId) {
          await OneSignal.login(userId);
          console.log("🟢 Dispositivo sincronizzato con l'ID OneSignal:", userId);
        }
      });
    </script>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #4ed310, #0d3cd6, #cf0baf);
            color: white;
            box-sizing: border-box;
            font-family: Arial;
            padding: 20px;
        }
        .container{
            background-color: black;
            padding: 30px 100px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        .center{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        button{
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            background-color: #4ed310;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2px;
        }
        button:hover{
            background-color: #4ed310;
            transform: translateY(-2px);
        }
        .input{
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid white;
            border-radius: 5px;
            background-color: white;
            color: black;
            font-family: monospace;
            box-sizing: border-box;
            flex: 1;
        }
        .input:focus{
            outline: none;
            border-color: #007bff;
        }
        #inputContainer{
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: auto;
            margin-left: -80px;
            margin-right: -80px;
        }
        .input-group{
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .delete{
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 10px;
            margin-top: 2px;
        }
        .delete:hover{
            background-color: #c82333;
            transform: translateY(-2px);
        }
        .check{
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 10px;
            margin-top: 2px;
        }
        .check:hover{
            background-color: #218838;
            transform: translateY(-2px);
        }
        .date-input {
            padding: 10px 14px;
            font-size: 16px;
            border: 1px solid #fffefe;
            border-radius: 6px;
            outline: none;
            background-color: #000000;
            color: #ffffff;
            transition: all 0.5s ease;
            font-family: inherit;
            margin-right: 10px;
        }
        .date-input:focus {
            border-color: #80bdff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        .date-input:disabled {
            -webkit-text-fill-color: #ffffff !important;
            cursor: not-allowed;
        }
        .date-input::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
        .input-group {
            transition: all 0.5s ease;
            opacity: 1;
            background-color: transparent;
            padding: 5px;
            border-radius: 4px;
        }
        .input-group.fade-out-complete {
            opacity: 0;
            transform: translateY(-10px);
            background-color: rgba(40, 167, 69, 0.2);
        }
        .input-group.fade-out-delete {
            opacity: 0;
            transform: translateY(10px);
            background-color: rgba(220, 53, 69, 0.2);
        }
        .cronologia{
            margin-bottom: 2px;
        }
        #cronologiaHeaderBox {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            margin-bottom: 20px;
            width: 100%;
        }
        #titoloCronologia {
            margin: 0 0 10px 0 !important;
            text-align: center;
            font-size: 24px;
        }
        #btnSvuotaCronologia {
            margin-left: 0 !important; 
            font-size: 14px;
            padding: 6px 12px;
            cursor: pointer;
        }
#cronologiaContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
}

#cronologiaContainer .input-group {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
}
@media (max-width: 768px){
    button{
        width: 100%;
        padding: 15px 24px;
        font-size: 18px;
        margin-bottom: 0;
        box-sizing: border-box;
    }
    .input-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 15px 0;
        width: 100%;
    }
    .input {
        width: 100%;
        padding: 15px;
        font-size: 16px;
        margin-right: 0;
        margin-bottom: 10px;
        box-sizing: border-box;
        text-align: center;
    }
    .check, .delete {
        width: 100%;
        padding: 15px 20px;
        font-size: 18px;
        margin-left: 0;
        margin-top: 5px;
        margin-bottom: 5px;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    body {
        min-height: 100vh;
        font-size: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 15px;
    }
    .container{
        margin: auto 0;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
    }
    .date-input {
        width: 100%;
        padding: 15px;
        font-size: 16px;
        margin-bottom: 10px;
        box-sizing: border-box;
        text-align: center;
        text-align-last: center;
    }
    #cronologiaHeaderBox {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        margin-top: 30px;
        margin-bottom: 15px;
        box-sizing: border-box;
    }
    #titoloCronologia {
        margin: 0 0 10px 0 !important;
        font-size: 22px;
        text-align: center;
        width: 100%;
    }
    #btnSvuotaCronologia {
        width: 100%;
        padding: 15px 24px;
        font-size: 16px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }
    .delete-single-history {
        width: 100%;
        padding: 15px 20px !important;
        font-size: 18px;
        margin-left: 0 !important;
        margin-top: 5px !important;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #cronologiaContainer {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important; 
        justify-content: center !important;
        width: 100% !important;
        margin: 0 auto !important;
        padding: 0 !important;
        box-sizing: border-box !important;
    }
    #cronologiaContainer .input-group {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important; 
        justify-content: center !important;
        width: 100% !important;
        text-align: center !important;
        margin: 15px 0 !important;
        padding: 0 !important;
    }
    #cronologiaContainer .input-group .date-input {
        width: 100% !important;
        max-width: 100% !important;
        padding: 8px !important;
        font-size: 13px !important;
        text-align: center !important;
        text-align-last: center !important;
        margin: 0 0 10px 0 !important;
        display: block !important;
        box-sizing: border-box !important;
    }
    #cronologiaContainer .input-group .input {
        width: 100% !important;
        max-width: 100% !important;
        padding: 8px !important;
        font-size: 13px !important;
        text-align: center !important;
        margin: 0 0 10px 0 !important;
        box-sizing: border-box !important;
    }
    #cronologiaContainer .input-group .delete-single-history {
        width: 100% !important;
        padding: 8px 15px !important;
        font-size: 14px !important;
        margin: 0 !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        box-sizing: border-box !important;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <div class="center">
            <h1>TO-DO LIST</h1>
            <button id="addInput">+ Aggiungi</button>
        <div id="inputContainer"></div>
        <div id="areaData"></div>
    </div>
        <ul style="font-family: Arial;" id="cronologiaContainer"></ul>
    </div>
    <script src="to-do_list.js"></script>
</body>
</html>
